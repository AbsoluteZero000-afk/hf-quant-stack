name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
    
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/poetry.lock') }}
    
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction --no-root
    
    - name: Install project
      run: poetry install --no-interaction
    
    - name: Set environment variables
      run: |
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db" >> $GITHUB_ENV
        echo "TESTING=1" >> $GITHUB_ENV
        echo "ALPACA_API_KEY=test_key" >> $GITHUB_ENV
        echo "ALPACA_SECRET_KEY=test_secret" >> $GITHUB_ENV
    
    - name: Run linting
      run: |
        poetry run flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
        poetry run flake8 src --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
    
    - name: Run black formatting check
      run: poetry run black --check src
    
    - name: Run isort import check
      run: poetry run isort --check-only src
    
    - name: Run mypy type checking
      run: poetry run mypy src --ignore-missing-imports
    
    - name: Run tests with pytest
      run: |
        poetry run pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  smoke-test:
    runs-on: ubuntu-latest
    needs: test
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
    
    - name: Install dependencies
      run: poetry install --no-interaction
    
    - name: Set environment variables
      run: |
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db" >> $GITHUB_ENV
        echo "TESTING=1" >> $GITHUB_ENV
        echo "ALPACA_API_KEY=test_key" >> $GITHUB_ENV
        echo "ALPACA_SECRET_KEY=test_secret" >> $GITHUB_ENV
    
    - name: Initialize system
      run: poetry run python -m src.cli init
    
    - name: Run smoke test backtest
      run: poetry run python -m src.cli backtest --strategy momentum --universe sample
    
    - name: Verify output files
      run: |
        ls -la reports/
        test -f reports/momentum_pnl.csv

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: false
        tags: hf-quant-stack:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max